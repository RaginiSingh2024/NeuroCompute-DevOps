apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuro-frontend
  namespace: neurocompute
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuro-frontend
  template:
    metadata:
      labels:
        app: neuro-frontend
    spec:
      containers:
        - name: frontend
          image: neurocompute/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
