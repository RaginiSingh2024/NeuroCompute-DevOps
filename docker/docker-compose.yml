version: '3.8'
services:
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: neuro-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5001:5000"
    restart: always

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: neuro-frontend
    ports:
      - "80:80"
    restart: always

# Optional reverse proxy / traefik or nginx can be added
